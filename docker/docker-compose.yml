services:
  app:
    build:
      context: ".."
      dockerfile: "docker/Dockerfile"
    ports: ["8080:8080"]
    env_file: ["../.env"]
    depends_on:
      ollama:
        condition: "service_healthy"
      chroma:
        condition: "service_started"
    volumes: ["../demo-data:/app/demo-data:ro", "../data:/app/data"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: "10s"
      timeout: "5s"
      retries: 5
  ollama:
    image: "ollama/ollama:latest"
    ports: ["11434:11434"]
    volumes: ["ollama_data:/root/.ollama"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: "10s"
      timeout: "5s"
      retries: 10
  chroma:
    image: "chromadb/chroma:latest"
    ports: ["8000:8000"]
    volumes: ["chroma_data:/chroma/chroma"]
    environment:
      IS_PERSISTENT: "TRUE"
volumes:
  ollama_data:
  chroma_data:
